<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeMix AI | Viral Short Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #050505; color: #fff; }
        .aesthetic { font-family: 'Playfair Display', serif; }
        .trending-card { border: 1px solid #27272a; transition: all 0.3s ease; }
        .trending-card:hover { border-color: #8b5cf6; background: #1a1a1a; }
        .selected-song { border-color: #8b5cf6; background: #2e1065; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        /* Custom Scrollbar */
        #trending-list::-webkit-scrollbar { width: 5px; }
        #trending-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <header class="text-center mb-10">
        <h1 class="text-6xl font-bold aesthetic italic bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600">VibeMix AI</h1>
        <p class="text-zinc-400 mt-2 text-lg">Turn raw clips into heartwarming YT Shorts with trending vibes.</p>
    </header>

    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
        <section class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">🔥 1. Global Trends (Last.fm)</h2>
            <div id="trending-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                <p class="text-zinc-500 italic">Fetching global charts...</p>
            </div>
        </section>

        <section class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 flex flex-col">
            <h2 class="text-xl font-semibold mb-4">✨ 2. Upload & AI Mix</h2>
            
            <div id="drop-zone" class="flex-grow border-2 border-dashed border-zinc-700 rounded-2xl flex flex-col items-center justify-center p-8 hover:border-purple-500 transition cursor-pointer">
                <input type="file" id="file-input" class="hidden" accept="video/*">
                <span class="text-4xl mb-2">☁️</span>
                <p class="text-sm text-zinc-400 text-center">Click to upload your video</p>
            </div>

            <button id="generate-btn" disabled class="mt-6 w-full py-4 bg-purple-600 rounded-xl font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-purple-500 transition">
                Create Aesthetic Short
            </button>
        </section>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-900 p-8 rounded-3xl max-w-lg w-full text-center border border-zinc-800">
            <div id="loading-state">
                <div class="animate-spin h-12 w-12 border-4 border-purple-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <h3 class="text-2xl font-bold mb-2">AI is Crafting...</h3>
                <p id="progress-text" class="text-zinc-400 text-sm italic">Fetching heartwarming lyrics from LRCLIB...</p>
            </div>
            
            <div id="result-state" class="hidden">
                <h3 class="text-2xl font-bold mb-4 aesthetic italic">Heartwarming Short Ready!</h3>
                <video id="final-video" controls class="w-full rounded-xl mb-6 shadow-2xl"></video>
                <div class="flex gap-4">
                    <button onclick="location.reload()" class="flex-1 py-3 bg-zinc-800 rounded-xl font-semibold hover:bg-zinc-700 transition">Try Another</button>
                    <a id="download-link" href="#" download class="flex-1 py-3 bg-purple-600 rounded-xl font-semibold text-center hover:bg-purple-500 transition">Download</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const LASTFM_API_KEY = "1f0ca1157a8545e42bef725367c2426a"; // Get free at last.fm/api
        const VADOO_API_KEY = "-bp4jjXNtuncZXpiDc4HQVXvAJpZxsrxZ5WotFx4liM";   // Get from viral.vadoo.tv

        let selectedSong = null;
        let selectedArtist = null;
        const trendingList = document.getElementById('trending-list');
        const generateBtn = document.getElementById('generate-btn');
        const progressText = document.getElementById('progress-text');

        // 1. FETCH TRENDS FROM LAST.FM (FREE)
        async function fetchTrends() {
            try {
                const response = await fetch(`https://ws.audioscrobbler.com/2.0/?method=chart.gettoptracks&api_key=${1f0ca1157a8545e42bef725367c2426a}&format=json&limit=15`);
                const data = await response.json();
                
                trendingList.innerHTML = data.tracks.track.map(track => `
                    <div class="trending-card p-3 rounded-xl cursor-pointer transition" 
                         onclick="selectSong('${track.name.replace(/'/g, "\\'")}', '${track.artist.name.replace(/'/g, "\\'")}', this)">
                        <p class="font-medium text-sm truncate">${track.name}</p>
                        <p class="text-xs text-zinc-500 italic">${track.artist.name}</p>
                    </div>
                `).join('');
            } catch (e) {
                trendingList.innerHTML = "<p class='text-red-400 text-sm p-4'>Error loading Last.fm trends. Check your API Key.</p>";
            }
        }

        function selectSong(title, artist, el) {
            selectedSong = title;
            selectedArtist = artist;
            document.querySelectorAll('.trending-card').forEach(c => c.classList.remove('selected-song'));
            el.classList.add('selected-song');
            checkReady();
        }

       // 2. FILE HANDLING
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            if(fileInput.files[0]) {
                dropZone.innerHTML = `<span class='text-purple-400 text-sm font-bold'>✅ ${fileInput.files[0].name}</span>`;
                checkReady();
            }
        };

        function checkReady() {
            if(selectedSong && fileInput.files[0]) generateBtn.disabled = false;
        }

        // 3. AI MIXING LOGIC (LRCLIB + VADOO)
        generateBtn.onclick = async () => {
            document.getElementById('modal').classList.remove('hidden');
            
            try {
                // STEP A: Fetch Sync Lyrics from LRCLIB (Free, No Key)
                progressText.innerText = "Finding synced lyrics for " + selectedSong + "...";
                const lyricRes = await fetch(`https://lrclib.net/api/search?artist_name=${encodeURIComponent(selectedArtist)}&track_name=${encodeURIComponent(selectedSong)}`);
                const lyricData = await lyricRes.json();
                const syncedLyrics = lyricData[0]?.syncedLyrics || "Aesthetic visual vibe...";

                // STEP B: Send to Vadoo AI Editor
                progressText.innerText = "AI is mixing video and beat-syncing lyrics...";
                
                // Note: In a real local setup, you'd need a public URL for your video file.
                // Here we simulate the Vadoo API response time.
                const vadooResponse = await fetch("https://aiapi.vadoo.tv/v1/create-short", {
                    method: "POST",
                    headers: { "X-Api-Key": VADOO_API_KEY, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        music: selectedSong + " " + selectedArtist,
                        lyrics: syncedLyrics,
                        theme: "aesthetic_heartwarming",
                        font: "Playfair Display"
                    })
                });

                // SIMULATION (Since we are local and don't have a public video URL yet)
                setTimeout(() => {
                    progressText.innerText = "Applying heartwarming filters and color grading...";
                    setTimeout(() => {
                        document.getElementById('loading-state').classList.add('hidden');
                        document.getElementById('result-state').classList.remove('hidden');
                        const localUrl = URL.createObjectURL(fileInput.files[0]);
                        document.getElementById('final-video').src = localUrl;
                        document.getElementById('download-link').href = localUrl;
                    }, 3000);
                }, 3000);

            } catch (err) {
                alert("AI Mix failed. Check console for details.");
                console.error(err);
                location.reload();
            }
        };

        fetchTrends();
    </script>
</body>
</html>
