<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Short Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
width:420px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

h1{
margin-top:0;
font-size:26px;
}

p{
opacity:0.8;
}

input{
margin-top:20px;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

#status{
margin-top:20px;
font-size:14px;
opacity:0.9;
}

video{
margin-top:20px;
max-width:100%;
border-radius:8px;
display:none;
}

#download{
display:none;
margin-top:15px;
background:#3b82f6;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Shorts Generator</h1>

<p>
Upload a video under 30MB.  
The system converts it into a vertical short.
</p>

<input type="file" id="videoInput" accept="video/*">

<br>

<button id="uploadBtn">Generate Short</button>

<div id="status"></div>

<video id="preview" controls></video>

<br>

<button id="download">Download Result</button>

</div>

<script>

const uploadBtn = document.getElementById("uploadBtn");
const videoInput = document.getElementById("videoInput");
const statusText = document.getElementById("status");
const preview = document.getElementById("preview");
const downloadBtn = document.getElementById("download");

let processedBlob = null;

uploadBtn.onclick = async () => {

const file = videoInput.files[0];

if(!file){
statusText.innerText = "Select a video file.";
return;
}

if(file.size > 30 * 1024 * 1024){
statusText.innerText = "File too large. Max 30MB.";
return;
}

statusText.innerText = "Uploading...";

uploadBtn.disabled = true;

const formData = new FormData();
formData.append("video", file);

/*
IMPORTANT

Replace the URL below
with your backend API later
*/

const API_URL = "https://your-backend-url/generate";

try{

const response = await fetch(API_URL,{
method:"POST",
body:formData
});

if(!response.ok){
throw new Error("Processing failed");
}

processedBlob = await response.blob();

const videoURL = URL.createObjectURL(processedBlob);

preview.src = videoURL;
preview.style.display="block";

downloadBtn.style.display="inline-block";

statusText.innerText = "Video generated successfully.";

}catch(err){

statusText.innerText = "Error: backend not connected yet.";

}

uploadBtn.disabled = false;

}

downloadBtn.onclick = () => {

if(!processedBlob) return;

const url = URL.createObjectURL(processedBlob);

const a = document.createElement("a");
a.href = url;
a.download = "short.mp4";
a.click();

}

</script>

</body>
</html>
