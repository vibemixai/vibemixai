<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeMix AI | Viral Short Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #050505; color: #fff; }
        .aesthetic { font-family: 'Playfair Display', serif; }
        .trending-card:hover { border-color: #8b5cf6; background: #1a1a1a; }
        .selected-song { border-color: #8b5cf6; background: #2e1065; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <header class="text-center mb-10">
        <h1 class="text-6xl font-bold aesthetic italic bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600">VibeMix AI</h1>
        <p class="text-zinc-400 mt-2 text-lg">Turn raw clips into heartwarming YT Shorts in one click.</p>
    </header>

    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
        <section class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">🔥 1. Pick a Trending Vibe</h2>
            <div id="trending-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                <p class="text-zinc-500 italic">Loading trends...</p>
            </div>
        </section>

        <section class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 flex flex-col">
            <h2 class="text-xl font-semibold mb-4">✨ 2. Upload & Mix</h2>
            
            <div id="drop-zone" class="flex-grow border-2 border-dashed border-zinc-700 rounded-2xl flex flex-col items-center justify-center p-8 hover:border-purple-500 transition cursor-pointer">
                <input type="file" id="file-input" class="hidden" accept="video/*">
                <span class="text-4xl mb-2">☁️</span>
                <p class="text-sm text-zinc-400 text-center">Click to upload your video clip</p>
            </div>

            <button id="generate-btn" disabled class="mt-6 w-full py-4 bg-purple-600 rounded-xl font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-purple-500 transition">
                Create Aesthetic Short
            </button>
        </section>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-900 p-8 rounded-3xl max-w-lg w-full text-center border border-zinc-800">
            <div id="loading-state">
                <div class="animate-spin h-12 w-12 border-4 border-purple-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <h3 class="text-2xl font-bold mb-2">AI is Editing...</h3>
                <p class="text-zinc-400">Syncing lyrics, matching beats, and applying aesthetic filters.</p>
            </div>
            <div id="result-state" class="hidden">
                <h3 class="text-2xl font-bold mb-4 aesthetic italic">Your Short is Ready!</h3>
                <video id="final-video" controls class="w-full rounded-xl mb-6 shadow-2xl"></video>
                <div class="flex gap-4">
                    <button onclick="location.reload()" class="flex-1 py-3 bg-zinc-800 rounded-xl font-semibold">Start Over</button>
                    <a id="download-link" href="#" download class="flex-1 py-3 bg-purple-600 rounded-xl font-semibold text-center">Download</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API CONFIGURATION (Get your keys at: https://vadoo.tv/ & Google Cloud Console)
        const VADOO_API_KEY = "YOUR_VADOO_API_KEY";
        const YT_API_KEY = "YOUR_YOUTUBE_API_KEY";

        let selectedSong = null;
        const trendingList = document.getElementById('trending-list');
        const generateBtn = document.getElementById('generate-btn');

        // 1. Fetch Trending Music via YouTube API
        async function fetchTrends() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&videoCategoryId=10&maxResults=10&key=${YT_API_KEY}`);
                const data = await response.json();
                
                trendingList.innerHTML = data.items.map(item => `
                    <div class="trending-card p-3 border border-zinc-800 rounded-xl cursor-pointer transition" 
                         onclick="selectSong('${item.snippet.title.replace(/'/g, "\\'")}', this)">
                        <p class="font-medium text-sm truncate">${item.snippet.title}</p>
                        <p class="text-xs text-zinc-500">${item.snippet.channelTitle}</p>
                    </div>
                `).join('');
            } catch (e) {
                trendingList.innerHTML = "<p class='text-red-400'>Error loading trends. Check API Key.</p>";
            }
        }

        function selectSong(title, el) {
            selectedSong = title;
            document.querySelectorAll('.trending-card').forEach(c => c.classList.remove('selected-song'));
            el.classList.add('selected-song');
            checkReady();
        }

        // 2. File Upload Handling
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            if(fileInput.files[0]) {
                dropZone.innerHTML = `<span class='text-green-500 text-sm'>✅ ${fileInput.files[0].name} uploaded</span>`;
                checkReady();
            }
        };

        function checkReady() {
            if(selectedSong && fileInput.files[0]) generateBtn.disabled = false;
        }

        // 3. The "AI Magic" Logic (Calling Vadoo AI API)
        generateBtn.onclick = async () => {
            document.getElementById('modal').classList.remove('hidden');
            
            // In a real 2026 production environment, you would:
            // A) Upload the raw video to a bucket (S3/Cloudinary)
            // B) Send that URL to Vadoo's "Create AI Captions" or "AI Mix" endpoint
            
            // SIMULATED API CALL:
            const response = await fetch("https://aiapi.vadoo.tv/v1/create-short", {
                method: "POST",
                headers: { "X-Api-Key": VADOO_API_KEY, "Content-Type": "application/json" },
                body: JSON.stringify({
                    video_url: "USER_UPLOADED_URL", // Link to uploaded file
                    music_query: selectedSong,
                    aesthetic_theme: "heartwarming",
                    dynamic_lyrics: true,
                    style: "alex_hormozi_style" // Popular aesthetic caption style
                })
            });

            // Simulate rendering time
            setTimeout(() => {
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('result-state').classList.remove('hidden');
                // Mocking the result for the demo
                const demoVideo = URL.createObjectURL(fileInput.files[0]);
                document.getElementById('final-video').src = demoVideo;
                document.getElementById('download-link').href = demoVideo;
            }, 5000);
        };

        fetchTrends();
    </script>
    <script>// Replace 'YOUR_LASTFM_API_KEY' with the key you just got
const LASTFM_KEY = '1f0ca1157a8545e42bef725367c2426a';

async function getTrendingMusic() {
    const url = `https://ws.audioscrobbler.com/2.0/?method=chart.gettoptracks&api_key=${1f0ca1157a8545e42bef725367c2426a}&format=json&limit=10`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        // This pulls the top 10 trending songs worldwide
        return data.tracks.track.map(song => ({
            title: song.name,
            artist: song.artist.name
        }));
    } catch (error) {
        console.error("Failed to get trends:", error);
        return [{ title: "Lofi Study Beats", artist: "Chillhop" }]; // Fallback
    }
}</script>
</body>

</html>
